disallowed-types = [
    { path = "std::collections::HashSet", reason = "prefer faster hash set", replacement = "hashbrown::HashSet" },
    { path = "std::collections::HashMap", reason = "prefer faster hash map", replacement = "hashbrown::HashMap" },
    { path = "std::sync::Mutex", reason = "prefer faster & simpler non-poisonable mutex", replacement = "parking_lot::Mutex" },
    { path = "std::sync::RwLock", reason = "prefer faster & simpler non-poisonable read-write lock", replacement = "parking_lot::RwLock" },
    { path = "std::time::Instant", reason = "prefer faster but less accurate coarse version", replacement = "coarsetime::Instant" },
]
disallowed-methods = [
    { path = "std::fs::File::options", reason = "cache-path opens must set O_NOFOLLOW", replacement = "crate::utils::nofollow_options" },
    { path = "std::fs::OpenOptions::new", reason = "cache-path opens must set O_NOFOLLOW", replacement = "crate::utils::nofollow_options" },
    { path = "tokio::fs::File::options", reason = "cache-path opens must set O_NOFOLLOW", replacement = "crate::utils::tokio_nofollow_options" },
    { path = "tokio::fs::OpenOptions::new", reason = "cache-path opens must set O_NOFOLLOW", replacement = "crate::utils::tokio_nofollow_options" },
]
allow-unwrap-in-tests = true
semicolon-inside-block-ignore-singleline = true
semicolon-outside-block-ignore-multiline = true
